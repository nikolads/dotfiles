## Shortcuts
map ctrl+shift+r no_op

map ctrl+shift+enter new_window_with_cwd

map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

map ctrl+w>q close_window
map ctrl+w>q close_window

map ctrl+[ previous_window
map ctrl+] next_window

map ctrl+shift+, move_window_backward
map ctrl+shift+. move_window_forward

map ctrl+w>left neighboring_window left
map ctrl+w>right neighboring_window right
map ctrl+w>up neighboring_window up
map ctrl+w>down neighboring_window down

map alt+w>left neighboring_window left
map alt+w>right neighboring_window right
map alt+w>up neighboring_window up
map alt+w>down neighboring_window down

map ctrl+w>r start_resizing_window
map alt+w>r swart_resizing_window

map shift+page_up scroll_page_up
map shift+page_down scroll_page_down

map ctrl+shift+p>e          kitten hints --type path --program @
map ctrl+shift+p>shift+e    kitten hints --type path --program -
map ctrl+shift+p>f          kitten hints --type path --program @
map ctrl+shift+p>shift+f    kitten hints --type path --program -
map ctrl+shift+p>h          kitten hints --type hash --program @
map ctrl+shift+p>shift+h    kitten hints --type hash --program -

## Other
enable_audio_bell no
enabled_layouts tall,fat,grid
font_size 10
hide_window_decorations yes
mouse_hide 0
scrollback_lines 15000
strip_trailing_spaces smart # Remove spaces at the end of lines when copying to clipboard. A value of `smart` will do it when using normal selections, but not rectangle selections.

update_check_interval 0
linux_display_server x11
